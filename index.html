<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多站連測座標轉換工具 v3.0</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f6f7f9; --bg3:#eef1f4;
    --text:#16181d; --text2:#5b6470; --text3:#8a93a0;
    --border:#d9dee5; --border2:#b9c2cd;
    --blue:#1769aa; --blue-bg:#e8f2fb; --blue-text:#0c4776;
    --green:#257a4b; --green-bg:#e8f6ef; --green-text:#145231;
    --amber:#9a6508; --amber-bg:#fff3dd; --amber-text:#614006;
    --red:#9a2626; --red-bg:#fdecec; --red-text:#661717;
    --purple:#6551a8; --purple-bg:#f0edff; --purple-text:#43317c;
    --rms-good:#257a4b; --rms-good-bg:#e8f6ef;
    --rms-warn:#9a6508; --rms-warn-bg:#fff3dd;
    --rms-bad:#9a2626; --rms-bad-bg:#fdecec;
    --radius:8px; --radius-lg:10px;
    --shadow:0 10px 24px rgba(27,39,58,0.07);
    --shadow-sm:0 1px 2px rgba(27,39,58,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:13px;color:var(--text);background:linear-gradient(180deg,#fbfcfd 0,#f3f5f8 280px,#f6f7f9 100%);line-height:1.5}
  .page{max-width:1280px;margin:0 auto;padding:22px 18px 34px}
  .page-header{background:var(--bg);color:var(--text);border:1px solid var(--border);border-left:5px solid var(--blue);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .page-header h1{font-size:22px;font-weight:700;margin-bottom:5px;letter-spacing:0}
  .page-header p{font-size:12px;color:var(--text2);max-width:980px}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
  .chain-card{padding:12px 16px;margin-bottom:12px}
  .chain-label{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .sec-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--text)}
  .badge{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
  .b-blue{background:var(--blue-bg);color:var(--blue-text)}
  .b-green{background:var(--green-bg);color:var(--green-text)}
  .b-amber{background:var(--amber-bg);color:var(--amber-text)}
  .b-gray{background:var(--bg3);color:var(--text2)}
  .b-red{background:var(--red-bg);color:var(--red-text)}
  .b-purple{background:var(--purple-bg);color:var(--purple-text)}
  .info-box,.warn-box,.err-box{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-bottom:10px}
  .info-box{background:var(--blue-bg);color:var(--blue-text);border-left:3px solid var(--blue)}
  .warn-box{background:var(--amber-bg);color:var(--amber-text);border-left:3px solid #c07a10}
  .err-box{background:var(--red-bg);color:var(--red-text);border-left:3px solid #b03030}
  .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:#fff}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
  table th{background:#f0f3f6;color:#4f5966;font-weight:700;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
  table td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:'Courier New',monospace;font-size:11px;color:var(--text)}
  table tr:last-child td{border-bottom:none}
  table.merged th{background:var(--blue);color:#fff}
  table tr:hover td{background:var(--bg2)}
  .tag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;font-family:sans-serif;white-space:nowrap}
  .tag-gps{background:var(--green-bg);color:var(--green-text)}
  .tag-shared{background:var(--amber-bg);color:var(--amber-text)}
  .tag-new{background:var(--blue-bg);color:var(--blue-text)}
  .rms-good{background:var(--rms-good-bg);color:var(--rms-good);font-weight:600;border-radius:4px;padding:1px 7px;font-family:monospace}
  .rms-warn{background:var(--rms-warn-bg);color:var(--rms-warn);font-weight:600;border-radius:4px;padding:1px 7px;font-family:monospace}
  .rms-bad{background:var(--rms-bad-bg);color:var(--rms-bad);font-weight:600;border-radius:4px;padding:1px 7px;font-family:monospace}
  .chain-vis{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:2px 0}
  .chain-node{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid transparent;box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .chain-arrow{color:var(--text3);font-size:15px}
  .station-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:4px;background:#e9edf2;border:1px solid var(--border);border-radius:var(--radius-lg)}
  .stab{padding:7px 15px;font-size:12px;border-radius:7px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text2);font-weight:700;transition:all .15s}
  .stab:hover{border-color:var(--border2);background:var(--bg2)}
  .stab.active{background:#fff;color:var(--blue-text);border-color:var(--border);box-shadow:var(--shadow-sm)}
  .stab.has-gps{border-left:3px solid var(--green)}
  .stab.no-gps{border-left:3px solid #c07a10}
  .toggle{display:flex}
  .toggle button{border-radius:0;border-right-width:0;font-size:12px;padding:5px 12px}
  .toggle button:first-child{border-radius:var(--radius) 0 0 var(--radius)}
  .toggle button:last-child{border-radius:0 var(--radius) var(--radius) 0;border-right-width:1px}
  .toggle button.ay{background:var(--green);color:#fff;border-color:var(--green)}
  .toggle button.an{background:#8a5a0a;color:#fff;border-color:#8a5a0a}
  button{border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;font-size:12px;background:var(--bg);color:var(--text);cursor:pointer;font-weight:700;transition:all .15s;min-height:34px}
  button:hover{background:var(--bg2);border-color:var(--text3);box-shadow:var(--shadow-sm)}
  button:active{transform:scale(.98)}
  button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  button.primary:hover{background:#1450a0}
  button.success{background:var(--green);color:#fff;border-color:var(--green)}
  button.success:hover{background:#235510}
  button.danger{color:var(--red);border-color:#e0b0b0}
  button.danger:hover{background:var(--red-bg)}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .action-bar{position:sticky;top:0;z-index:5;background:rgba(246,247,249,.93);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
  textarea{width:100%;min-height:132px;border:1px solid var(--border2);border-radius:var(--radius);padding:11px 12px;font-size:12px;font-family:'Courier New',monospace;background:#fbfcfd;color:var(--text);resize:vertical;line-height:1.7}
  textarea:focus{outline:none;border-color:var(--blue);background:#fff}
  .parse-preview{font-size:11px;color:var(--text2);margin-top:6px;min-height:18px}
  input[type=text]{border:1px solid var(--border2);border-radius:var(--radius);padding:7px 9px;background:#fbfcfd;color:var(--text);font-size:13px}
  input[type=text]:focus{outline:none;border-color:var(--blue);background:#fff}
  .shared-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .shared-pill{background:var(--amber-bg);color:var(--amber-text);border-radius:99px;font-size:11px;padding:2px 10px;font-family:monospace;font-weight:500}
  .stn-badge{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--bg3);color:var(--text2);font-family:sans-serif;margin-left:2px}
  .divider{border:none;border-top:1px solid var(--border);margin:14px 0}
  .station-card{padding:0;overflow:hidden}
  .station-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 16px;background:#fbfcfd;border-bottom:1px solid var(--border)}
  .station-body{padding:16px}
  .result-stn-header{display:flex;align-items:center;gap:8px;margin:16px 0 8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
  .result-stn-header:first-child{padding-top:0;border-top:none}
  .metric-strip{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap;padding:9px 10px;background:#fbfcfd;border:1px solid var(--border);border-radius:var(--radius)}
  .iter-log{background:#fbfcfd;border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:11px;font-family:monospace;color:var(--text2);margin-bottom:12px;line-height:1.8}
  .iter-log .ok{color:var(--green)}
  .iter-log .skip{color:var(--text3)}
  .iter-log .err{color:var(--red)}
  .iter-log .round{font-weight:600;color:var(--blue);font-family:sans-serif}
  .closure-good{color:var(--green);font-weight:600}
  .closure-warn{color:var(--amber);font-weight:600}
  .closure-bad{color:var(--red);font-weight:600}
  #traverse-map .leaflet-popup-content{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;line-height:1.6;min-width:160px}
  #traverse-map .leaflet-popup-content b{font-size:13px;display:block;margin-bottom:2px}
  .leaflet-container{font-family:'Segoe UI',system-ui,sans-serif}
  @media (max-width:720px){
    .page{padding:14px 10px 24px}
    .page-header{padding:16px}
    .page-header h1{font-size:19px}
    .station-toolbar{align-items:stretch}
    .station-toolbar input[type=text]{width:100%!important}
    .station-toolbar .toggle{width:100%}
    .station-toolbar .toggle button{flex:1}
    .station-toolbar button.danger{margin-left:0!important;width:100%}
    .action-bar button{flex:1 1 calc(50% - 8px)}
    table th,table td{padding:7px 8px}
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="page">

<div class="page-header">
  <h1>多站連測座標轉換工具 v3.0</h1>
  <p>貼上格式：點名,X,Y,Z,屬性（屬性可留空）· 相同點名自動視為共同點 · 雙向傳遞 · 閉合差平差 · 高程採平移法（kz=1）· RMS + SD 雙指標</p>
</div>

<div class="card chain-card">
  <div class="chain-label">座標傳遞鏈</div>
  <div class="chain-vis" id="chain-area"></div>
</div>

<div class="station-tabs" id="station-tabs"></div>
<div id="station-panels"></div>

<div class="btn-row action-bar">
  <button class="primary" onclick="addStation()">+ 新增測站</button>
  <button class="success" onclick="runAll()">▶ 執行全站計算</button>
  <button onclick="loadExample()">載入範例資料</button>
  <button class="danger" onclick="clearAll()">清除全部</button>
</div>

<div id="result-area"></div>
</div>

<script>
let stations=[], activeIdx=0;
function uid(){ return Math.random().toString(36).slice(2,7); }

function parsePaste(text){
  const rows=[];
  (text||'').trim().split('\n').forEach(line=>{
    const raw=line.trim(); if(!raw) return;
    const p=raw.split(/[,\t]+/).map(s=>s.trim());
    if(p.length>=4) rows.push({name:p[0],lx:p[1],ly:p[2],lz:p[3],attr:p[4]||''});
    else if(p.length===3) rows.push({name:p[0],lx:p[1],ly:p[2],lz:'0',attr:''});
  });
  return rows;
}
function parseGPS(text){
  const map={};
  (text||'').trim().split('\n').forEach(line=>{
    const raw=line.trim(); if(!raw) return;
    const p=raw.split(/[,\t]+/).map(s=>s.trim());
    if(p.length>=4) map[p[0]]={gE:p[1],gN:p[2],gH:p[3],attr:p[4]||''};
  });
  return map;
}
function collectInputs(si){
  const s=stations[si];
  const nm=document.getElementById('sname_'+s.id); if(nm) s.name=nm.value;
  const lp=document.getElementById('lp_'+s.id); if(lp) s.localPasteText=lp.value;
  const gp=document.getElementById('gp_'+s.id); if(gp) s.gpsPasteText=gp.value;
}
function saveAll(){ stations.forEach((_,si)=>collectInputs(si)); }

function addStation(name,gpsFlag,localText,gpsText){
  const id=uid();
  stations.push({id,name:name||('測站'+(stations.length+1)),
    hasGPS:gpsFlag!==false,localPasteText:localText||'',gpsPasteText:gpsText||''});
  activeIdx=stations.length-1; render();
}
function removeStation(si){
  saveAll();
  if(stations.length<=1){ alert('至少保留一個測站'); return; }
  if(!confirm('確定刪除「'+stations[si].name+'」？')) return;
  stations.splice(si,1);
  if(activeIdx>=stations.length) activeIdx=stations.length-1;
  render();
}
function setActive(si){ saveAll(); activeIdx=si; render(); }
function toggleGPS(si,val){ collectInputs(si); stations[si].hasGPS=val; render(); }
function onLP(si){
  const s=stations[si];
  const el=document.getElementById('lp_'+s.id); if(el) s.localPasteText=el.value;
  const pv=document.getElementById('lpv_'+si); if(pv) pv.innerHTML=lpPreview(si);
}
function onGP(si){
  const s=stations[si];
  const el=document.getElementById('gp_'+s.id); if(el) s.gpsPasteText=el.value;
  const pv=document.getElementById('gpv_'+s.id); if(pv) pv.innerHTML=gpPreview(s.gpsPasteText);
}

function getAllNames(){
  const names=new Set();
  stations.forEach(s=>parsePaste(s.localPasteText).forEach(r=>names.add(r.name)));
  return names;
}
function lpPreview(si){
  const s=stations[si];
  const rows=parsePaste(s.localPasteText);
  if(!rows.length) return '<span style="color:var(--text3)">尚未輸入資料</span>';
  const hasAttr=rows.some(x=>x.attr);
  if(!s.hasGPS){
    const allNames=getAllNames();
    const shared=rows.filter(r=>{
      return stations.some((os,osi)=> osi!==si && parsePaste(os.localPasteText).some(or=>or.name===r.name));
    });
    const pills=shared.length
      ? `<div class="shared-pills">${shared.map(r=>`<span class="shared-pill">${r.name}</span>`).join('')}</div>`
      : '<span style="color:#c07a10"> 尚未偵測到共同點</span>';
    return `<span style="color:var(--green)">解析到 ${rows.length} 個點${hasAttr?' · 含屬性欄':''}</span>`
      +`<span style="color:var(--amber)"> · 偵測共同點 ${shared.length} 個：</span>${pills}`;
  }
  return `<span style="color:var(--green)">解析到 ${rows.length} 個點${hasAttr?' · 含屬性欄':''}</span>`;
}
function gpPreview(text){
  const m=parseGPS(text); const keys=Object.keys(m);
  if(!keys.length) return '<span style="color:var(--text3)">尚未輸入資料</span>';
  return `<span style="color:var(--green)">解析到 ${keys.length} 個 GPS 控制點：${keys.slice(0,4).join('、')}${keys.length>4?'…':''}</span>`;
}

function addGpsOnlyPointsToMerge(mmap){
  const localNames=getAllNames();
  stations.forEach(s=>{
    if(!s.hasGPS) return;
    const gpsMap=parseGPS(s.gpsPasteText);
    Object.entries(gpsMap).forEach(([name,g])=>{
      if(localNames.has(name)) return;
      const E=parseFloat(g.gE), N=parseFloat(g.gN), H=parseFloat(g.gH)||0;
      if(!Number.isFinite(E)||!Number.isFinite(N)) return;
      if(!mmap[name]){
        mmap[name]={E,N,H,attr:g.attr||'',tag:'gps',stns:[s.name]};
        return;
      }
      if(!mmap[name].stns.includes(s.name)) mmap[name].stns.push(s.name);
      mmap[name].E=E; mmap[name].N=N; mmap[name].H=H; mmap[name].tag='gps';
      if(g.attr&&!mmap[name].attr) mmap[name].attr=g.attr;
    });
  });
}

function render(){ renderChain(); renderTabs(); renderPanels(); }

function renderChain(){
  const el=document.getElementById('chain-area');
  if(!stations.length){ el.innerHTML='<span style="color:var(--text3);font-size:12px">尚未建立測站</span>'; return; }
  el.innerHTML=stations.map((s,i)=>{
    const bg=s.hasGPS?'#e8f5e0':'#fdf0d8',tc=s.hasGPS?'#1b4510':'#5c3a05',border=s.hasGPS?'#2d6b1a':'#c07a10';
    return `<span class="chain-node" style="background:${bg};color:${tc};border-color:${border}">${s.name}<span style="font-size:10px;margin-left:5px;opacity:.7">${s.hasGPS?'GPS':'傳遞'}</span></span>`
      +(i<stations.length-1?'<span class="chain-arrow">⇄</span>':'');
  }).join('');
}
function renderTabs(){
  document.getElementById('station-tabs').innerHTML=stations.map((s,i)=>
    `<div class="stab${i===activeIdx?' active':''} ${s.hasGPS?'has-gps':'no-gps'}" onclick="setActive(${i})">${s.name}</div>`
  ).join('');
}
function renderPanels(){
  document.getElementById('station-panels').innerHTML=stations.map((s,si)=>{
    if(si!==activeIdx) return '';
    const extra=s.hasGPS?`
      <hr class="divider">
      <div class="sec-title" style="margin-bottom:6px">GPS 絕對座標 <span class="badge b-green">點名,E,N,H,屬性</span></div>
      <div class="warn-box">點名需與全測站資料完全一致，系統依點名自動配對</div>
      <textarea id="gp_${s.id}" placeholder="直接貼上，格式：點名,E,N,H,屬性（屬性可省略）&#10;例：A1,246523.450,2665134.220,52.180,控制點" oninput="onGP(${si})">${s.gpsPasteText}</textarea>
      <div class="parse-preview" id="gpv_${s.id}">${gpPreview(s.gpsPasteText)}</div>`:
      `<hr class="divider">
      <div class="sec-title" style="margin-bottom:6px">共同點偵測 <span class="badge b-amber">自動比對點名</span> <span class="badge b-purple">支援雙向傳遞</span></div>
      <div class="info-box">系統自動將本站與任意其他站中點名相同的點視為共同點，無論前站或後站皆可，不需手動設定</div>`;
    return `<div class="card station-card">
      <div class="station-toolbar">
        <input type="text" id="sname_${s.id}" value="${s.name}" style="font-size:14px;font-weight:600;width:130px">
        <span style="font-size:12px;color:var(--text2)">此站類型：</span>
        <div class="toggle">
          <button class="${s.hasGPS?'ay':''}" onclick="toggleGPS(${si},true)">有 GPS</button>
          <button class="${!s.hasGPS?'an':''}" onclick="toggleGPS(${si},false)">傳遞站</button>
        </div>
        <button class="danger" style="margin-left:auto" onclick="removeStation(${si})">刪除此站</button>
      </div>
      <div class="station-body">
      <div class="sec-title" style="margin-bottom:6px">全測站相對座標
        <span class="badge b-blue">點名,X,Y,Z,屬性</span>
        <span style="font-size:11px;color:var(--text3)">屬性可留空</span>
      </div>
      <textarea id="lp_${s.id}"
        placeholder="直接貼上，格式：點名,X,Y,Z,屬性（逗號或 Tab 分隔）&#10;例：&#10;A1,0.000,0.000,10.250,控制點&#10;S1,30.000,160.000,13.500,共同點&#10;T1,55.200,120.400,11.900,電力孔蓋"
        oninput="onLP(${si})">${s.localPasteText}</textarea>
      <div class="parse-preview" id="lpv_${si}">${lpPreview(si)}</div>
      ${extra}
      </div>
    </div>`;
  }).join('');
}

function helmert(ctrl){
  const n=ctrl.length; if(n<2) return null;
  let sXX=0,sYY=0,sX=0,sY=0,sXE=0,sXN=0,sYE=0,sYN=0,sE=0,sN=0,sZ=0,sH=0;
  for(const p of ctrl){
    sXX+=p.lx*p.lx; sYY+=p.ly*p.ly; sX+=p.lx; sY+=p.ly;
    sXE+=p.lx*p.gE; sXN+=p.lx*p.gN; sYE+=p.ly*p.gE; sYN+=p.ly*p.gN;
    sE+=p.gE; sN+=p.gN; sZ+=p.lz; sH+=p.gH;
  }
  const S=sXX+sYY,D=S-(sX*sX+sY*sY)/n;
  if(Math.abs(D)<1e-15) return null;
  const a=(sXE+sYN-(sX*sE+sY*sN)/n)/D;
  const b=(sXN-sYE-(sX*sN-sY*sE)/n)/D;
  const tx=(sE-a*sX+b*sY)/n,ty=(sN-b*sX-a*sY)/n;
  // 高程：kz 固定為 1，只計算平移 dz = mean(gH - lz)
  const kz=1, dz=(sH-sZ)/n;
  // 第一輪：累積殘差總和（用於計算 RMS 和 SD 的平均值）
  let sE2=0,sN2=0,sH2=0,s3d=0;
  let mE=0,mN=0,mH=0;
  const resids=[];
  for(const p of ctrl){
    const dE=a*p.lx-b*p.ly+tx-p.gE, dN=b*p.lx+a*p.ly+ty-p.gN, dH=p.lz+dz-p.gH;
    sE2+=dE*dE; sN2+=dN*dN; sH2+=dH*dH; s3d+=dE*dE+dN*dN+dH*dH;
    mE+=dE; mN+=dN; mH+=dH;
    resids.push({dE,dN,dH});
  }
  mE/=n; mN/=n; mH/=n;
  // 第二輪：計算標準差 SD（殘差相對於平均值的離散程度）
  let sdE2=0,sdN2=0,sdH2=0,sd3d2=0;
  for(const r of resids){
    sdE2+=(r.dE-mE)**2; sdN2+=(r.dN-mN)**2; sdH2+=(r.dH-mH)**2;
    sd3d2+=(r.dE-mE)**2+(r.dN-mN)**2+(r.dH-mH)**2;
  }
  const dof=n>1?n-1:1; // 自由度
  const scale=Math.sqrt(a*a+b*b);
  const scaleWarn = scale<0.995||scale>1.005;
  const scaleErr  = scale<0.950||scale>1.050;
  return {a,b,tx,ty,kz,dz,scale,rot:Math.atan2(b,a)*180/Math.PI,n,
    rmsE:Math.sqrt(sE2/n),  rmsN:Math.sqrt(sN2/n),  rmsH:Math.sqrt(sH2/n),
    rms2D:Math.sqrt((sE2+sN2)/n), rms3D:Math.sqrt(s3d/n),
    sdE:Math.sqrt(sdE2/dof), sdN:Math.sqrt(sdN2/dof), sdH:Math.sqrt(sdH2/dof),
    sd2D:Math.sqrt((sdE2+sdN2)/dof), sd3D:Math.sqrt(sd3d2/dof),
    scaleWarn,scaleErr};
}

function tryCalcStation(s, lib){
  const localRows=parsePaste(s.localPasteText);
  if(!localRows.length) return null;
  const ctrl=[];
  const parsed=localRows.map(r=>({
    name:r.name,lx:parseFloat(r.lx),ly:parseFloat(r.ly),lz:parseFloat(r.lz)||0,
    attr:r.attr||'',gE:null,gN:null,gH:null,isCtrl:false,isGPS:false
  }));
  if(s.hasGPS){
    const gpsMap=parseGPS(s.gpsPasteText);
    parsed.forEach(p=>{
      const g=gpsMap[p.name];
      if(g){p.gE=parseFloat(g.gE);p.gN=parseFloat(g.gN);p.gH=parseFloat(g.gH)||0;p.isCtrl=true;p.isGPS=true;ctrl.push(p);}
    });
  } else {
    parsed.forEach(p=>{
      if(lib[p.name]){p.gE=lib[p.name].E;p.gN=lib[p.name].N;p.gH=lib[p.name].H;p.isCtrl=true;ctrl.push(p);}
    });
  }
  if(ctrl.length<2) return null;
  const hp=helmert(ctrl);
  if(!hp) return null;
  const pts=[];
  parsed.forEach(p=>{
    const E=hp.a*p.lx-hp.b*p.ly+hp.tx,N=hp.b*p.lx+hp.a*p.ly+hp.ty,H=hp.kz*p.lz+hp.dz;
    const tag=p.isGPS?'gps':p.isCtrl?'shared':'new';
    pts.push({name:p.name,lx:p.lx,ly:p.ly,lz:p.lz,attr:p.attr,E,N,H,tag});
  });
  return {hp, sharedNames:ctrl.map(p=>p.name), pts};
}

function rmsTag(v){
  if(!v&&v!==0) return '<span class="badge b-gray">—</span>';
  const s=v.toFixed(6);
  if(v<0.01) return `<span class="rms-good">${s}</span>`;
  if(v<0.05) return `<span class="rms-warn">${s}</span>`;
  return `<span class="rms-bad">${s}</span>`;
}

// ── 找出各傳遞段 ─────────────────────────────────────────────────
// 支援三種情況：
//   A. GPS站 → 傳遞站... → GPS站  （標準閉合段，雙端固定）
//   B. 傳遞站... → GPS站 → 傳遞站...（中間有GPS，向兩端擴散）
//   C. 傳遞站... → GPS站（首/末端單邊，無閉合差可平差，僅傳遞）
// 回傳 [{from:si|null, to:si|null, relays:[si,...], type:'closed'|'open'}]
function findSegments(results){
  const n=stations.length;
  const isGPS=stations.map(s=>s.hasGPS);
  const gpsStnIdx=stations.map((s,i)=>s.hasGPS?i:-1).filter(i=>i>=0);
  if(!gpsStnIdx.length) return [];

  const segs=[];

  // A+B：每兩個相鄰 GPS 站之間的傳遞站
  for(let g=0;g<gpsStnIdx.length-1;g++){
    const from=gpsStnIdx[g], to=gpsStnIdx[g+1];
    const relays=[];
    for(let i=from+1;i<to;i++) relays.push(i);
    if(relays.length>0) segs.push({from,to,relays,type:'closed'});
  }

  // C：第一個GPS站之前的傳遞站（只有後端固定，無法平差，僅標記）
  const firstGPS=gpsStnIdx[0];
  if(firstGPS>0){
    const relays=[];
    for(let i=0;i<firstGPS;i++) relays.push(i);
    segs.push({from:null,to:firstGPS,relays,type:'open_start'});
  }

  // C：最後一個GPS站之後的傳遞站（只有前端固定，無法平差，僅標記）
  const lastGPS=gpsStnIdx[gpsStnIdx.length-1];
  if(lastGPS<n-1){
    const relays=[];
    for(let i=lastGPS+1;i<n;i++) relays.push(i);
    segs.push({from:lastGPS,to:null,relays,type:'open_end'});
  }

  return segs;
}

// ── 線性內插平差：把閉合差按站序比例分配給傳遞站 ──────────────
function applyClosureAdjustment(results){
  const adjLog=[];
  const segs=findSegments(results);
  if(!segs.length) return {adjLog, closures:[]};

  const closures=[];

  segs.forEach(seg=>{
    // open_start / open_end：單端固定，無閉合差，僅記錄
    if(seg.type==='open_start'){
      adjLog.push(
        `<span style="color:var(--text3)">ℹ ${seg.relays.map(i=>stations[i].name).join('、')} → `+
        `${stations[seg.to].name}（單端固定，無閉合差，座標由 ${stations[seg.to].name} 向前傳遞）</span>`
      );
      return;
    }
    if(seg.type==='open_end'){
      adjLog.push(
        `<span style="color:var(--text3)">ℹ ${stations[seg.from].name} → `+
        `${seg.relays.map(i=>stations[i].name).join('、')}（單端固定，無閉合差，座標由 ${stations[seg.from].name} 向後傳遞）</span>`
      );
      return;
    }

    // closed：兩端都有GPS，計算閉合差並平差
    const rFrom=results[seg.from], rTo=results[seg.to];
    if(!rFrom||!rTo) return;

    const fromLib={}, toLib={};
    rFrom.pts.forEach(p=>{ fromLib[p.name]={E:p.E,N:p.N,H:p.H}; });
    rTo.pts.forEach(p=>{ toLib[p.name]={E:p.E,N:p.N,H:p.H}; });

    const commonPts=Object.keys(fromLib).filter(n=>toLib[n]);
    if(!commonPts.length){
      adjLog.push(`<span style="color:var(--amber)">⚠ ${stations[seg.from].name} → ${stations[seg.to].name}：找不到兩站共同點，無法計算閉合差</span>`);
      return;
    }

    let dE=0,dN=0,dH=0;
    commonPts.forEach(n=>{
      dE+=toLib[n].E-fromLib[n].E;
      dN+=toLib[n].N-fromLib[n].N;
      dH+=toLib[n].H-fromLib[n].H;
    });
    dE/=commonPts.length; dN/=commonPts.length; dH/=commonPts.length;

    const totalSteps=seg.relays.length+1;
    const closure3D=Math.sqrt(dE*dE+dN*dN+dH*dH);

    closures.push({
      fromName:stations[seg.from].name,
      toName:stations[seg.to].name,
      relayNames:seg.relays.map(i=>stations[i].name),
      dE,dN,dH,closure3D,commonPts
    });

    // 按比例分配修正量給中間傳遞站
    seg.relays.forEach((si,idx)=>{
      if(!results[si]) return;
      const ratio=(idx+1)/totalSteps;
      const corrE=-dE*ratio, corrN=-dN*ratio, corrH=-dH*ratio;
      results[si].pts.forEach(p=>{
        p.E+=corrE; p.N+=corrN; p.H+=corrH;
        p.adj={corrE,corrN,corrH};
      });
      results[si].adjApplied={corrE,corrN,corrH,ratio};
    });

    adjLog.push(
      `<span class="ok">✓ ${stations[seg.from].name} → ${stations[seg.to].name}（閉合差 E=${dE.toFixed(4)}m N=${dN.toFixed(4)}m H=${dH.toFixed(4)}m 3D=${closure3D.toFixed(4)}m，共同點：${commonPts.join('、')}，已按比例修正 ${seg.relays.map(i=>stations[i].name).join('、')}）</span>`
    );
  });

  return {adjLog, closures};
}

function runAll(){
  saveAll();

  // 第一階段：多輪迭代計算（雙向傳遞）
  const MAX_ROUNDS=stations.length+2;
  const results=new Array(stations.length).fill(null);
  const lib={};
  const iterLog=[];
  let changed=true;
  let round=0;

  while(changed && round<MAX_ROUNDS){
    changed=false;
    round++;
    const roundLog=[];

    for(let si=0;si<stations.length;si++){
      if(results[si]!==null) continue;
      const s=stations[si];
      const res=tryCalcStation(s, lib);
      if(res){
        results[si]=res;
        res.pts.forEach(p=>{ lib[p.name]={E:p.E,N:p.N,H:p.H}; });
        changed=true;
        const scaleNote=res.hp.scaleErr
          ?` ⚠ 縮放異常 ${res.hp.scale.toFixed(5)}`
          :res.hp.scaleWarn?` ⚠ 縮放偏離 ${res.hp.scale.toFixed(5)}`:'';
        roundLog.push(`<span class="ok">✓ ${s.name}（控制點 ${res.hp.n} 個，RMS 3D=${res.hp.rms3D.toFixed(4)}m  SD 3D=${res.hp.sd3D.toFixed(4)}m${scaleNote}）</span>`);
      } else {
        roundLog.push(`<span class="skip">… ${s.name}（控制點不足，待下一輪）</span>`);
      }
    }
    iterLog.push({round, items:roundLog});
  }

  // 第二階段：閉合差平差
  const {adjLog, closures}=applyClosureAdjustment(results);

  const failedStns=stations.filter((_,si)=>results[si]===null).map(s=>s.name);

  renderResults(results, iterLog, failedStns, adjLog, closures);
}

  });
  html+='</div>';

    <button onclick="copyTsv('merged')" id="cb_merged">複製合併結果 (TSV)</button>
    <button onclick="downloadMergedCsv()" id="cb_merged_csv">下載合併座標 (CSV)</button>
    <button class="success" onclick="downloadReport()" id="cb_report">下載報表 (HTML)</button>
  </div>`;

  // 地圖卡片
  html+=`<div class="card" id="map-card">
    <div class="sec-title" style="font-size:15px">成果地圖
      <span class="badge b-green">${mpts.length} 個唯一點位</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--text2)">座標帶：</span>
        <div class="toggle">
          <button id="zone121" class="ay" onclick="setMapZone(121)">121°E</button>
          <button id="zone119" onclick="setMapZone(119)">119°E</button>
        </div>
        <button onclick="fitMapBounds()">⊡ 縮放至全部</button>
      </span>
    </div>
    <div id="traverse-map" style="height:500px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;background:var(--bg3)"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:6px">
      底圖：OpenStreetMap © contributors ｜ CartoDB © CARTO ｜ 座標系統：TWD97 TM2 — 第二分帶預設 121°E 中央經線，若點位偏移可改選 119°E（第一分帶）
    </div>
  </div>`;

  document.getElementById('result-area').innerHTML=html;
  window._perTsv=perTsv; window._mergedTsv=mergedTsv;
  window._mpts=mpts; window._currentZone=121;
  window._lastReportData={results, failedStns, closures, mpts, generatedAt:new Date()};
  setTimeout(()=>renderMap(mpts,121), 80);
}

function copyTsv(t){
  let txt='',bid='';
  if(t==='per'){
    txt='站名\t點名\t屬性\t類型\t全站X\t全站Y\t全站Z\tE絕對座標\tN絕對座標\tH高程\tX,Y\n'+(window._perTsv||'');
    bid='cb_per';
  } else {
    txt='點名\t屬性\t類型\tE絕對座標\tN絕對座標\tH高程\tX,Y\tWGS84(N,E)\t出現站\n'+(window._mergedTsv||'');
    bid='cb_merged';
  }
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById(bid);
    if(b){const o=b.textContent;b.textContent='✓ 已複製！';setTimeout(()=>b.textContent=o,2000);}
  });
}

function csvCell(v){
  const s=String(v??'');
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}
function downloadTextFile(filename, content, type){
  const blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function downloadMergedCsv(){
  const mpts=window._mpts;
  if(!mpts||!mpts.length){ alert('請先執行全站計算後再下載 CSV'); return; }
  const header=['點名','屬性','類型','E絕對座標','N絕對座標','H高程','X,Y','WGS84(N,E)','出現站'];
  const rows=[header];
  mpts.forEach(([name,p])=>{
    const type=p.tag==='gps'?'GPS控制點':p.tag==='shared'?'共同點':'新點位';
    const [wLat,wLon]=twd97ToWgs84(p.E,p.N,window._currentZone||121);
    rows.push([
      name,
      p.attr||'',
      type,
      p.E.toFixed(6),
      p.N.toFixed(6),
      p.H.toFixed(6),
      `${p.E.toFixed(3)},${p.N.toFixed(3)}`,
      `${wLat.toFixed(6)},${wLon.toFixed(6)}`,
      p.stns.join('、')
    ]);
  });
  const csv='\ufeff'+rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const stamp=new Date().toISOString().replace(/[:T]/g,'-').slice(0,16);
  downloadTextFile(`TraverseLink_merged_coordinates_${stamp}.csv`,csv,'text/csv;charset=utf-8');
}

function escHtml(v){
  return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtNum(v,d=6){
  return (Number.isFinite(v)) ? v.toFixed(d) : '—';
}
function stationTypeLabel(s){
  return s&&s.hasGPS ? 'GPS站' : '傳遞站';
}
function qualityLabel(v){
  if(!Number.isFinite(v)) return '未計算';
  if(v<0.01) return '良好';
  if(v<0.05) return '注意';
  return '需檢核';
}
function buildReportHtml(data){
  const reportDate=data.generatedAt instanceof Date ? data.generatedAt : new Date(data.generatedAt||Date.now());
  const stationRows=stations.map((s,si)=>{
    const r=data.results[si];
    if(!r){
      return `<tr class="bad"><td>${escHtml(s.name)}</td><td>${stationTypeLabel(s)}</td><td colspan="15">未完成計算：控制點不足或共同點無法連接</td></tr>`;
    }
    const hp=r.hp;
    const q=qualityLabel(hp.rms3D);
    const cls=q==='良好'?'good':q==='注意'?'warn':'bad';
    return `<tr>
      <td>${escHtml(s.name)}</td>
      <td>${stationTypeLabel(s)}</td>
      <td>${hp.n}</td>
      <td>${escHtml(r.sharedNames.join('、'))}</td>
      <td>${fmtNum(hp.rmsE)}</td><td>${fmtNum(hp.rmsN)}</td><td>${fmtNum(hp.rmsH)}</td><td>${fmtNum(hp.rms3D)}</td>
      <td>${fmtNum(hp.sdE)}</td><td>${fmtNum(hp.sdN)}</td><td>${fmtNum(hp.sdH)}</td><td>${fmtNum(hp.sd3D)}</td>
      <td>${fmtNum(hp.scale,8)}</td><td>${fmtNum(hp.rot,4)}</td>
      <td>${r.adjApplied?`E ${fmtNum(r.adjApplied.corrE,4)} / N ${fmtNum(r.adjApplied.corrN,4)} / H ${fmtNum(r.adjApplied.corrH,4)}`:'—'}</td>
      <td class="${cls}">${q}</td>
    </tr>`;
  }).join('');

  const closureRows=(data.closures||[]).length ? data.closures.map(c=>`
    <tr>
      <td>${escHtml(c.fromName)} → ${escHtml(c.toName)}</td>
      <td>${escHtml(c.relayNames.join('、')||'—')}</td>
      <td>${escHtml(c.commonPts.join('、'))}</td>
      <td>${fmtNum(c.dE)}</td><td>${fmtNum(c.dN)}</td><td>${fmtNum(c.dH)}</td><td>${fmtNum(c.closure3D)}</td>
      <td class="${c.closure3D<0.01?'good':c.closure3D<0.05?'warn':'bad'}">${qualityLabel(c.closure3D)}</td>
    </tr>`).join('') : '<tr><td colspan="8">無雙端 GPS 閉合段或無閉合差資料</td></tr>';

  const pointRows=(data.mpts||[]).map(([name,p])=>{
    const type=p.tag==='gps'?'GPS控制點':p.tag==='shared'?'共同點':'新點位';
    return `<tr>
      <td>${escHtml(name)}</td><td>${escHtml(p.attr||'—')}</td><td>${type}</td>
      <td>${fmtNum(p.E)}</td><td>${fmtNum(p.N)}</td><td>${fmtNum(p.H)}</td>
      <td>${escHtml(p.stns.join('、'))}</td>
    </tr>`;
  }).join('');

  const suggestions=[];
  const failed=(data.failedStns||[]);
  if(failed.length) suggestions.push(`未完成測站：${failed.join('、')}，建議確認至少 2 個共同點且點名完全一致。`);
  data.results.forEach((r,si)=>{
    if(!r) return;
    const s=stations[si], hp=r.hp;
    if(hp.n<3) suggestions.push(`${s.name} 控制點數為 ${hp.n}，可增加第 3 點以上以提高檢核能力。`);
    if(hp.rms3D>=0.05 || hp.sd3D>=0.05) suggestions.push(`${s.name} 的 RMS/SD 3D 偏高，建議檢查控制點坐標、點名、稜鏡高與觀測紀錄。`);
    if(hp.scaleWarn) suggestions.push(`${s.name} 比例尺 ${hp.scale.toFixed(6)} 超出常用檢核範圍，建議確認儀器設定與單位。`);
  });
  (data.closures||[]).forEach(c=>{
    if(c.closure3D>=0.05) suggestions.push(`${c.fromName} → ${c.toName} 閉合差 3D=${c.closure3D.toFixed(4)}m，建議優先複核中間傳遞站與共同點。`);
  });
  if(!suggestions.length) suggestions.push('目前各站計算指標未見明顯異常；留存時建議一併保存原始全站資料、GPS 控制點資料、儀器名稱、作業日期與坐標系統。');

  return `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
  <title>TraverseLink 計算報表</title>
  <style>
    body{font-family:'Segoe UI',Arial,'Noto Sans TC',sans-serif;color:#1a1a1a;margin:28px;line-height:1.5}
    h1{font-size:22px;margin:0 0 4px} h2{font-size:16px;margin:24px 0 8px}
    .meta{color:#666;font-size:12px;margin-bottom:18px}
    table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
    th,td{border:1px solid #d8d6cf;padding:6px 8px;text-align:left;vertical-align:top}
    th{background:#f5f5f0;color:#555550;white-space:nowrap}
    .good{color:#2d6b1a;font-weight:700}.warn{color:#8a5a0a;font-weight:700}.bad{color:#8a2020;font-weight:700}
    ul{margin-top:6px}.small{font-size:11px;color:#777}
  </style></head><body>
  <h1>TraverseLink 計算報表</h1>
  <div class="meta">產生時間：${escHtml(reportDate.toLocaleString('zh-TW'))} ｜ 測站數：${stations.length} ｜ 成功：${data.results.filter(Boolean).length} ｜ 失敗：${failed.length}</div>

  <h2>各站摘要</h2>
  <table><thead><tr>
    <th>站名</th><th>站別</th><th>控制點數</th><th>控制/共同點</th>
    <th>RMS E</th><th>RMS N</th><th>RMS H</th><th>RMS 3D</th>
    <th>SD E</th><th>SD N</th><th>SD H</th><th>SD 3D</th>
    <th>比例尺</th><th>旋轉角</th><th>閉合修正</th><th>檢核</th>
  </tr></thead><tbody>${stationRows}</tbody></table>

  <h2>閉合差摘要</h2>
  <table><thead><tr><th>傳遞段</th><th>中間傳遞站</th><th>共同點</th><th>E</th><th>N</th><th>H</th><th>3D</th><th>檢核</th></tr></thead><tbody>${closureRows}</tbody></table>

  <h2>合併點位摘要</h2>
  <table><thead><tr><th>點名</th><th>屬性</th><th>類型</th><th>E</th><th>N</th><th>H</th><th>出現站</th></tr></thead><tbody>${pointRows}</tbody></table>

  <h2>建議檢查事項</h2>
  <ul>${suggestions.map(s=>`<li>${escHtml(s)}</li>`).join('')}</ul>
  <div class="small">RMS/SD 單位為公尺。此報表依目前畫面最後一次計算結果產生。</div>
  </body></html>`;
}
function downloadReport(){
  const data=window._lastReportData;
  if(!data){ alert('請先執行全站計算後再下載報表'); return; }
  const html=buildReportHtml(data);
  const stamp=new Date().toISOString().replace(/[:T]/g,'-').slice(0,16);
  downloadTextFile(`TraverseLink_report_${stamp}.html`,html,'text/html;charset=utf-8');
}

function clearAll(){
  if(!confirm('確定清除所有資料？')) return;
  if(_leafletMap){ _leafletMap.remove(); _leafletMap=null; }
  stations=[]; activeIdx=0;
  document.getElementById('result-area').innerHTML='';
  addStation('測站1',true);
}

// ── 地圖相關 ──────────────────────────────────────────────────────
let _leafletMap=null;

// TWD97 TM2 逆投影（Snyder 公式）→ WGS84 緯經度
// lon0Deg: 中央經線，第二分帶=121，第一分帶=119
function twd97ToWgs84(E,N,lon0Deg){
  const a=6378137.0, f=1/298.257222101, k0=0.9999, FE=250000;
  const e2=2*f-f*f, e4=e2*e2, e6=e4*e2;
  const ePrime2=e2/(1-e2);
  const lon0=lon0Deg*Math.PI/180;
  const x=E-FE, y=N;
  // 垂足緯度
  const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const M=y/k0;
  const mu=M/(a*(1-e2/4-3*e4/64-5*e6/256));
  const phi1=mu
    +(3*e1/2-27*e1**3/32)*Math.sin(2*mu)
    +(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)
    +(151*e1**3/96)*Math.sin(6*mu)
    +(1097*e1**4/512)*Math.sin(8*mu);
  const sinP=Math.sin(phi1),cosP=Math.cos(phi1),tanP=Math.tan(phi1);
  const N1=a/Math.sqrt(1-e2*sinP*sinP);
  const T1=tanP*tanP, C1=ePrime2*cosP*cosP;
  const R1=a*(1-e2)/Math.pow(1-e2*sinP*sinP,1.5);
  const D=x/(N1*k0);
  const lat=phi1-(N1*tanP/R1)*(
    D*D/2
    -(5+3*T1+10*C1-4*C1*C1-9*ePrime2)*D**4/24
    +(61+90*T1+298*C1+45*T1*T1-252*ePrime2-3*C1*C1)*D**6/720
  );
  const lon=lon0+(
    D-(1+2*T1+C1)*D**3/6
    +(5-2*C1+28*T1-3*C1*C1+8*ePrime2+24*T1*T1)*D**5/120
  )/cosP;
  return [lat*180/Math.PI, lon*180/Math.PI];
}

function renderMap(mpts,lon0Deg){
  if(!window.L){
    const el=document.getElementById('traverse-map');
    if(el) el.innerHTML='<div style="padding:28px;text-align:center;color:var(--red)">Leaflet 套件載入失敗，請確認網路連線後重新整理</div>';
    return;
  }
  if(_leafletMap){ _leafletMap.remove(); _leafletMap=null; }
  const el=document.getElementById('traverse-map');
  if(!el) return;

  _leafletMap=L.map('traverse-map');

  const osmLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom:19
  });
  const cartoLight=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom:19
  });
  cartoLight.addTo(_leafletMap);

  const gpsGroup=L.layerGroup().addTo(_leafletMap);
  const sharedGroup=L.layerGroup().addTo(_leafletMap);
  const newGroup=L.layerGroup().addTo(_leafletMap);

  const bounds=[];
  mpts.forEach(([name,p])=>{
    const ll=twd97ToWgs84(p.E,p.N,lon0Deg);
    bounds.push(ll);
    let col,fill,r;
    if(p.tag==='gps')     { col='#1b4510'; fill='#2d6b1a'; r=9; }
    else if(p.tag==='shared'){ col='#5c3a05'; fill='#c07a10'; r=7; }
    else                   { col='#0d3d7a'; fill='#1a5fa8'; r=5; }
    const typeLabel=p.tag==='gps'?'GPS控制點':p.tag==='shared'?'共同點':'新點位';
    const mk=L.circleMarker(ll,{radius:r,color:col,fillColor:fill,fillOpacity:0.85,weight:2});
    mk.bindTooltip(name,{permanent:false,direction:'top',offset:[0,-8],opacity:0.92});
    mk.bindPopup(
      `<b>${name}</b>`+
      `<span style="color:#777;font-size:11px"> ${typeLabel}</span><br>`+
      `<b>E</b> ${p.E.toFixed(3)}<br>`+
      `<b>N</b> ${p.N.toFixed(3)}<br>`+
      `<b>H</b> ${p.H.toFixed(3)}`+
      (p.attr?`<br><b>屬性</b> ${p.attr}`:'')+
      `<br><b>出現站</b> ${p.stns.join('、')}`
    );
    if(p.tag==='gps') gpsGroup.addLayer(mk);
    else if(p.tag==='shared') sharedGroup.addLayer(mk);
    else newGroup.addLayer(mk);
  });

  L.control.layers(
    {'地圖 (CartoDB Light)':cartoLight,'地圖 (OpenStreetMap)':osmLayer},
    {'GPS控制點':gpsGroup,'共同點':sharedGroup,'新點位':newGroup},
    {position:'topright',collapsed:false}
  ).addTo(_leafletMap);

  window._mapBounds=bounds;
  if(bounds.length){
    _leafletMap.fitBounds(bounds,{padding:[48,48]});
  } else {
    _leafletMap.setView([23.97,120.97],12);
  }
}

function fitMapBounds(){
  if(_leafletMap&&window._mapBounds&&window._mapBounds.length){
    _leafletMap.fitBounds(window._mapBounds,{padding:[48,48]});
  }
}

function setMapZone(lon0){
  const b121=document.getElementById('zone121');
  const b119=document.getElementById('zone119');
  if(b121) b121.className=lon0===121?'ay':'';
  if(b119) b119.className=lon0===119?'ay':'';
  if(window._mpts) renderMap(window._mpts,lon0);
}

  // 測站4：末站有GPS，與測站3共享B1/B2/B3，形成閉合段（測站2→3→4）

`B1,246620.244,2665150.060,52.500
